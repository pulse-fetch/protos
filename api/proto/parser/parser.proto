syntax = "proto3";

package parser;

option go_package = "github.com/pulse-fetch/protos";

service Parser {
  rpc ForceTriggerParsing (TriggerRequest) returns (TriggerResponse);

  rpc CheckHealth (HealthRequest) returns (HealthResponse);
}

message TriggerRequest {
  string specific_vk_group_id = 1;
}

message TriggerResponse {
  string status = 1;
  string message = 2;
}

message HealthRequest {}

message HealthResponse {
  bool is_alive = 1;
  string last_parsed_at = 2;
}