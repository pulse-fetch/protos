syntax = "proto3";
package api;
option go_package = "github.com/pulse-fetch/protos";

service Auth{
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
}

message RegisterRequest{
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse{
  string jwt = 1;
}

message LoginRequest{
  string username = 1;
  string password = 2;
}
message LoginResponse{
  string jwt = 1;
}