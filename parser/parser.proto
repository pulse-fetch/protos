syntax = "proto3";

package parser;

option go_package = "github.com/pulse-fetch/protos";

service Parser {
  rpc StartParsing (ParseRequest) returns (ParseResponse);
}

message ParseRequest {
  string vk_group_id = 1;
  string vk_access_token = 2;
  int32 max_posts = 3;
  bool reindex = 4;
}

message ParseResponse {
  string task_id = 1;
  string status = 2;
  string message = 3;
  int32 processed_posts = 4;
  int32 indexed_chunks = 5;
}